<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Quiz — Gestion d'erreurs et tests RxJS</title><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;padding:2rem 1rem}.container{max-width:800px;margin:0 auto}h1{text-align:center;margin-bottom:.5rem;font-size:1.8rem;color:#fff}.subtitle{text-align:center;color:#8892b0;margin-bottom:2rem;font-size:1rem}.progress-bar-container{background:#0d1117;border-radius:10px;height:14px;margin-bottom:2rem;overflow:hidden}.progress-bar{background:linear-gradient(90deg,#0d6efd,#4dabf7);height:100%;width:0%;border-radius:10px;transition:width .4s ease}.progress-text{text-align:center;color:#8892b0;margin-bottom:1rem;font-size:.9rem}.card{background:#16213e;border-radius:12px;padding:2rem;margin-bottom:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,.3)}.question-label{font-size:.85rem;color:#4dabf7;text-transform:uppercase;letter-spacing:1px;margin-bottom:.5rem}.question-text{font-size:1.15rem;margin-bottom:1.2rem;line-height:1.5;color:#fff}pre{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:1rem;margin-bottom:1.2rem;overflow-x:auto;font-size:.95rem}code{font-family:'Consolas','Fira Code','Courier New',monospace;color:#c9d1d9}.options{list-style:none}.options li{margin-bottom:.5rem}.options label{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:#0d1117;border:2px solid #30363d;border-radius:8px;cursor:pointer;transition:border-color .2s,background .2s;font-size:1rem}.options label:hover{border-color:#4dabf7;background:#1c2a4a}.options input[type=radio]{accent-color:#0d6efd;width:18px;height:18px;flex-shrink:0}.btn{display:inline-block;padding:.7rem 2rem;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}.btn-primary{background:#0d6efd;color:#fff}.btn-primary:hover{background:#3b82f6}.btn-primary:disabled{background:#374151;cursor:not-allowed}.btn-restart{background:#238636;color:#fff;margin-top:1rem;padding:.7rem 2rem;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer}.btn-restart:hover{background:#2ea043}.feedback{margin-top:1rem;padding:1rem 1.2rem;border-radius:8px;font-size:.95rem;line-height:1.5;display:none}.feedback.correct{background:#0f5132;border:1px solid #198754;color:#d1fae5;display:block}.feedback.wrong{background:#842029;border:1px solid #dc3545;color:#fdd;display:block}.score-card{text-align:center;padding:3rem 2rem}.score-card .score{font-size:3rem;font-weight:700;color:#4dabf7;margin-bottom:.5rem}.score-card .score-label{font-size:1.2rem;color:#8892b0;margin-bottom:1.5rem}.hidden{display:none}</style></head><body><div class="container"><h1>Quiz — Erreurs et tests RxJS</h1><p class="subtitle">Cours 25 — catchError, retry, marble testing et fakeAsync</p><div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div><p class="progress-text" id="progressText">Question 1 / 5</p><div id="quizContainer"></div><div id="scoreContainer" class="card score-card hidden"></div></div><script>const questions=[{label:"Question 1 — Ordre des operateurs",text:"Quel est le probleme dans ce code ?",code:"this.http.get('/api/donnees').pipe(\n  catchError(() =&gt; of([])),\n  retry(3),\n).subscribe();",options:["<code>retry</code> ne peut pas etre utilise avec <code>catchError</code>","<code>catchError</code> est place AVANT <code>retry</code>, donc <code>retry</code> ne verra jamais l'erreur car elle est deja interceptee","Il manque un <code>subscribe</code>","Le <code>of([])</code> devrait etre <code>of(null)</code>"],answer:1,explanation:"<code>retry</code> doit etre place AVANT <code>catchError</code> dans le pipe. Si <code>catchError</code> est avant, il remplace l'erreur par une valeur de secours et <code>retry</code> ne voit jamais l'erreur. L'ordre correct est : <code>retry(3)</code> puis <code>catchError(() =&gt; of([]))</code>."},{label:"Question 2 — Marble testing",text:"Dans la syntaxe des marble diagrams RxJS, que represente le diagramme <code>'--a--b--#'</code> ?",options:["Emet a et b puis complete normalement","Emet a et b de maniere synchrone puis une erreur","Emet a, attend, emet b, attend, puis le flux termine en erreur","Emet a et b en boucle infinie"],answer:2,explanation:"Dans la syntaxe marble : <code>-</code> represente le passage du temps (1 frame), les lettres (<code>a</code>, <code>b</code>) sont des emissions de valeurs, et <code>#</code> represente une erreur. Le diagramme <code>'--a--b--#'</code> emet a, attend, emet b, attend, puis le flux se termine en erreur."},{label:"Question 3 — Fuites memoire",text:"Quelle est la solution recommandee dans Angular pour eviter les fuites memoire avec un Observable infini comme <code>interval()</code> ?",options:["Appeler <code>unsubscribe()</code> dans le constructeur","Utiliser <code>takeUntilDestroyed()</code> dans le pipe","Ne jamais utiliser <code>interval()</code> dans un composant","Mettre le subscribe dans <code>ngAfterViewInit</code>"],answer:1,explanation:"<code>takeUntilDestroyed()</code> est la solution recommandee dans Angular moderne. Il complete automatiquement l'Observable quand le composant est detruit, evitant ainsi les fuites memoire sans avoir a gerer manuellement le desabonnement."},{label:"Question 4 — fakeAsync et tick",text:"A quoi sert <code>tick(300)</code> dans un test Angular avec <code>fakeAsync</code> ?",options:["Il attend 300 millisecondes reelles avant de continuer","Il avance le temps virtuel de 300 ms, permettant de declencher les operations async planifiees (debounceTime, delay, etc.)","Il execute 300 souscriptions en parallele","Il repete le test 300 fois"],answer:1,explanation:"Dans un test <code>fakeAsync</code>, <code>tick(300)</code> avance le temps virtuel de 300 ms de maniere synchrone. Cela permet de declencher les operations basees sur le temps comme <code>debounceTime(300)</code> ou <code>delay(300)</code> sans attendre reellement."},{label:"Question 5 — shareReplay",text:"Quel probleme resout <code>shareReplay({ bufferSize: 1, refCount: true })</code> ?",code:"const produits$ = this.http.get&lt;Produit[]&gt;('/api/produits');\n\nproduits$.subscribe(p =&gt; this.liste = p);\nproduits$.subscribe(p =&gt; this.compteur = p.length);",options:["Il accelere les requetes HTTP","Il empeche les erreurs de se propager","Il evite que chaque <code>subscribe</code> declenche une nouvelle requete HTTP en partageant le resultat entre les souscripteurs","Il met en cache les donnees dans le localStorage"],answer:2,explanation:"Sans <code>shareReplay</code>, chaque <code>subscribe</code> sur un Observable froid (comme HttpClient) cree une nouvelle requete HTTP. Avec <code>shareReplay({ bufferSize: 1, refCount: true })</code>, le resultat est partage : une seule requete est envoyee et les souscripteurs suivants recoivent le meme resultat."}];let currentQuestion=0,score=0,answered=false;function renderQuestion(){const q=questions[currentQuestion],total=questions.length;document.getElementById('progressBar').style.width=((currentQuestion/total)*100)+'%';document.getElementById('progressText').textContent=`Question ${currentQuestion+1} / ${total}`;let html=`<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;if(q.code)html+=`<pre><code>${q.code}</code></pre>`;html+=`<ul class="options">`;q.options.forEach((opt,i)=>{html+=`<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`;});html+=`</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;document.getElementById('quizContainer').innerHTML=html;document.querySelectorAll('input[name="q"]').forEach(r=>{r.addEventListener('change',()=>{document.getElementById('validateBtn').disabled=false;});});answered=false;}function validate(){if(answered){currentQuestion++;if(currentQuestion<questions.length)renderQuestion();else showScore();return;}answered=true;const selected=document.querySelector('input[name="q"]:checked');if(!selected)return;const val=parseInt(selected.value),q=questions[currentQuestion];const fb=document.getElementById('feedback'),btn=document.getElementById('validateBtn');document.querySelectorAll('input[name="q"]').forEach(r=>r.disabled=true);if(val===q.answer){score++;fb.className='feedback correct';fb.innerHTML=`<strong>Correct !</strong> ${q.explanation}`;}else{fb.className='feedback wrong';fb.innerHTML=`<strong>Incorrect.</strong> ${q.explanation}`;}btn.textContent=currentQuestion<questions.length-1?'Suivant':'Voir le score';}function showScore(){document.getElementById('quizContainer').classList.add('hidden');document.getElementById('progressBar').style.width='100%';document.getElementById('progressText').textContent='Termine !';const sc=document.getElementById('scoreContainer');sc.classList.remove('hidden');const pct=Math.round((score/questions.length)*100);let msg=pct===100?'Parfait !':pct>=60?'Bien joue !':'Continuez a reviser !';sc.innerHTML=`<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;}function restart(){currentQuestion=0;score=0;answered=false;document.getElementById('scoreContainer').classList.add('hidden');document.getElementById('quizContainer').classList.remove('hidden');renderQuestion();}renderQuestion();</script></body></html>
