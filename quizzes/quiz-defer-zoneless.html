<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — @defer & Zoneless Change Detection</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz — @defer & Zoneless Change Detection</h1>
    <p class="subtitle">@defer, triggers, @placeholder, @loading, @error, prefetch, signals, zoneless</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1",
        text: "Quel est le comportement par defaut du bloc @defer si aucun trigger n'est specifie ?",
        code: "@defer {\n  &lt;app-heavy-chart /&gt;\n}\n@placeholder {\n  &lt;p&gt;Chargement en attente...&lt;/p&gt;\n}",
        options: [
          "Le composant est charge immediatement au rendu initial, comme sans @defer",
          "Le composant est charge lorsque le navigateur est idle (comportement idle par defaut)",
          "Le composant n'est jamais charge tant qu'un trigger explicite n'est pas ajoute",
          "Le composant est charge uniquement quand il entre dans le viewport"
        ],
        answer: 1,
        explanation: "Quand aucun trigger n'est specifie sur @defer, Angular utilise par defaut le trigger idle, ce qui signifie que le chargement du bloc est differe jusqu'a ce que le navigateur soit inactif (via requestIdleCallback). Cela permet d'eviter de bloquer le rendu initial tout en chargeant le composant des que possible."
      },
      {
        label: "Question 2",
        text: "Comment configurer un bloc @defer pour qu'il se charge quand l'utilisateur survole un element specifique, tout en prefetchant le bundle quand le bloc entre dans le viewport ?",
        code: "// Quelle syntaxe est correcte ?",
        options: [
          "@defer (on hover; prefetch on viewport) { &lt;app-tooltip /&gt; }",
          "@defer (trigger: hover, prefetch: viewport) { &lt;app-tooltip /&gt; }",
          "@defer (on hover) @prefetch (on viewport) { &lt;app-tooltip /&gt; }",
          "@defer [hover] [prefetch=viewport] { &lt;app-tooltip /&gt; }"
        ],
        answer: 0,
        explanation: "La syntaxe correcte utilise le mot-cle on suivi du trigger, et le prefetch est specifie avec un point-virgule dans les memes parentheses : @defer (on hover; prefetch on viewport). Le prefetch permet de telecharger le bundle JavaScript en avance (quand l'element entre dans le viewport) sans instancier le composant, qui ne sera rendu que lorsque l'utilisateur survolera l'element."
      },
      {
        label: "Question 3",
        text: "Quel est le role du bloc @loading et quelle est la difference avec @placeholder dans un @defer ?",
        code: "@defer (on viewport) {\n  &lt;app-dashboard /&gt;\n}\n@placeholder (minimum 200ms) {\n  &lt;div class=\"skeleton\"&gt;&lt;/div&gt;\n}\n@loading (after 100ms; minimum 500ms) {\n  &lt;app-spinner /&gt;\n}\n@error {\n  &lt;p&gt;Echec du chargement&lt;/p&gt;\n}",
        options: [
          "@placeholder et @loading sont identiques, c'est une question de preference syntaxique",
          "@placeholder s'affiche avant le declenchement, @loading s'affiche pendant le telechargement du bundle",
          "@loading remplace @placeholder dans les versions recentes d'Angular",
          "@placeholder s'affiche pendant le telechargement, @loading s'affiche apres une erreur reseau"
        ],
        answer: 1,
        explanation: "@placeholder est le contenu affiche initialement, avant que la condition de declenchement ne soit remplie. @loading s'affiche uniquement pendant le telechargement effectif du bundle JavaScript, une fois le trigger active. Les parametres after et minimum de @loading permettent de controler l'UX : after evite un flash de spinner pour les chargements rapides, et minimum garantit que le spinner reste visible assez longtemps pour ne pas clignoter."
      },
      {
        label: "Question 4",
        text: "Dans une application Angular zoneless, comment le framework detecte-t-il les changements d'etat pour mettre a jour le DOM ?",
        code: "// app.config.ts\nexport const appConfig: ApplicationConfig = {\n  providers: [\n    provideExperimentalZonelessChangeDetection()\n  ]\n};\n\n// counter.component.ts\n@Component({ ... })\nexport class CounterComponent {\n  count = signal(0);\n  increment() { this.count.update(v =&gt; v + 1); }\n}",
        options: [
          "Angular utilise un MutationObserver sur le DOM pour detecter tout changement",
          "Angular effectue un polling regulier toutes les 16ms pour verifier les changements",
          "Angular planifie la detection de changements via les notifications des signals et les evenements du framework",
          "Le developpeur doit appeler manuellement ChangeDetectorRef.detectChanges() apres chaque modification"
        ],
        answer: 2,
        explanation: "En mode zoneless, Angular n'utilise plus zone.js pour intercepter les operations asynchrones. A la place, le framework repose sur les signals (qui notifient Angular quand leur valeur change) et sur les evenements internes du framework (outputs, evenements du template, etc.) pour planifier un cycle de detection de changements. C'est plus performant car Angular ne re-verifie que les composants reellement impactes par un changement de signal."
      },
      {
        label: "Question 5",
        text: "Quel trigger @defer permet de declencher le chargement a partir d'une condition booleenne dynamique evaluee cote composant ?",
        code: "// Quel trigger utiliser pour charger le bloc\n// uniquement quand isAdmin() retourne true ?\n\n@defer (???) {\n  &lt;app-admin-panel /&gt;\n}",
        options: [
          "on interaction(isAdmin)",
          "on timer(isAdmin())",
          "when isAdmin()",
          "on condition(isAdmin)"
        ],
        answer: 2,
        explanation: "Le trigger when accepte une expression booleenne evaluee dans le contexte du composant. Contrairement aux triggers on (viewport, idle, hover, interaction, timer) qui sont bases sur des evenements du navigateur, when permet de conditionner le chargement differe sur une logique metier. Typiquement, on utilise when avec un signal : when isAdmin() ou le resultat d'un computed. Des que l'expression devient true, Angular declenche le telechargement et le rendu du bloc."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card">
        <p class="question-label">${q.label}</p>
        <p class="question-text">${q.text}</p>`;
      if (q.code) {
        html += `<pre><code>${q.code}</code></pre>`;
      }
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => {
        html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`;
      });
      html += `</ul>
        <button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>
        <div class="feedback" id="feedback"></div>
      </div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => {
        r.addEventListener('change', () => {
          document.getElementById('validateBtn').disabled = false;
        });
      });
      answered = false;
    }

    function validate() {
      if (answered) {
        currentQuestion++;
        if (currentQuestion < questions.length) {
          renderQuestion();
        } else {
          showScore();
        }
        return;
      }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`;
      }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }

    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = `Termine !`;
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div>
        <div class="score-label">${msg} (${pct}%)</div>
        <button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }

    function restart() {
      currentQuestion = 0; score = 0; answered = false;
      document.getElementById('scoreContainer').classList.add('hidden');
      document.getElementById('quizContainer').classList.remove('hidden');
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
